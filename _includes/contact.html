<section id="contact" class="section section-alt">
  <div class="container">
    <h2>Contact</h2>
    <p>The best way to reach me is by email.</p>
    <ul class="contact-list">
      {% if site.email %}<li><a href="mailto:{{ site.email }}">{{ site.email }}</a></li>{% endif %}
      {% if site.github %}<li><a href="https://github.com/{{ site.github }}">github.com/{{ site.github }}</a></li>{% endif %}
      {% if site.linkedin %}<li><a href="https://www.linkedin.com/in/{{ site.linkedin }}">LinkedIn</a></li>{% endif %}
      {% if site.scholar %}<li><a href="{{ site.scholar }}">Google Scholar</a></li>{% endif %}
    </ul>
  </div>
</section>
